<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChefKev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #ff0000;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 24px;
            border: 3px solid #ff0000;
            background: #1a1a1a;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }
        
        .bio {
            font-size: 14px;
            color: #cccccc;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }
        
        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 0, 0, 0.1);
            border: 1.5px solid #ff0000;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .link-btn:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: translateX(4px);
        }
        
        .link-btn i {
            font-size: 20px;
            color: #ff0000;
        }
        
        .video-section {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-top: 32px;
        }
        
        .video-label {
            font-size: 12px;
            color: #ff0000;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .video-embed {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
        
        .divider {
            height: 1px;
            background: rgba(255, 0, 0, 0.2);
            margin: 24px 0;
        }
        
        .footer-text {
            font-size: 12px;
            color: #888888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-pic">
            <img src="profilbild.png" alt="ChefKev">
        </div>
        
        <h1>ChefKev</h1>
        <p class="bio">Creator | Videoproduction | Vienna</p>
        
        <div class="links-grid">
            <a href="https://www.youtube.com/@chefkevv" target="_blank" class="link-btn">
                <span>YouTube</span>
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://www.instagram.com/chef.kev__" target="_blank" class="link-btn">
                <span>Instagram</span>
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.instagram.com/chefkev.agency" target="_blank" class="link-btn">
                <span>ChefKev Agency</span>
                <i class="fas fa-briefcase"></i>
            </a>
            <a href="https://chefkev.at" target="_blank" class="link-btn">
                <span>Website</span>
                <i class="fas fa-globe"></i>
            </a>
            <a href="mailto:contact@chefkev.at" class="link-btn">
                <span>Contact</span>
                <i class="fas fa-envelope"></i>
            </a>
        </div>
        
        <div class="divider"></div>
        
        <div class="video-section">
    <div class="video-label">Letztes Video</div>
    <a href="https://youtu.be/31-hb7X8P2s?si=piajvHs6AvL2dCDq" target="_blank" style="display:block; position:relative; border-radius:8px; overflow:hidden;">
        <img src="https://img.youtube.com/vi/31-hb7X8P2s/maxresdefault.jpg" alt="Letztes Video" style="width:100%; display:block; aspect-ratio:16/9; object-fit:cover;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:64px; height:64px; background:rgba(255,0,0,0.85); border-radius:50%; display:flex; align-items:center; justify-content:center;">
            <i class="fas fa-play" style="color:#fff; font-size:22px; margin-left:4px;"></i>
        </div>
    </a>
</div>
</body>
</html>
